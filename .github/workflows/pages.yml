name: Deploy to GitHub Pages

# Deterministic Pages deploy. The implicit "deploy from a branch" trigger
# DEBOUNCES rapid consecutive pushes (it silently skipped v3.37–v3.40), so the
# live site lagged. This explicit workflow runs on every push to main and, with
# concurrency cancel-in-progress:false, QUEUES builds instead of dropping them.
#
# It also publishes ONLY the app's public files — index.html, sw.js, icons — so
# tests/, backups/ (workout-data snapshots), and *.bak source are NOT served
# publicly (the old whole-root branch deploy exposed them).
#
# REQUIRES: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage only the public app files
        run: |
          mkdir -p _site
          cp index.html sw.js _site/
          for f in apple-touch-icon.png favicon.ico icon-192.png icon-512.png manifest.webmanifest manifest.json; do
            [ -f "$f" ] && cp "$f" _site/ || true
          done
          echo "Published files:" && ls -1 _site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
