name: tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backups/**'
  pull_request:
    branches: [main]

jobs:
  jsdom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install test deps
        working-directory: tests
        run: npm ci
      - name: Run jsdom suite
        working-directory: tests
        run: npm test
